# Main FAN control macro for managing environmental fans - Single & multiple mmu's.
#
# All variables are defined in `mmu_macro_vars.cfg`
#
# Pairs defined temperature sensors with fan by index and controls
# fans with hysteresis based on pairings.
#

[gcode_macro MMU_FAN]
description: Manage automatic multi-fan control.
gcode:

  {% if printer["gcode_macro _MMU_FAN_VARS"]is not defined %}
      M118 MMU Fan Control configuration is not defined for your printer
  {% else %}
      {% set enable     = params.ENABLE|default(-99)|int %}
      {% set fan_forced = params.FAN_FORCED|default(-99)|int %}
      {% set cfg        = printer["gcode_macro _MMU_FAN_VARS"] %}

     {% if enable not in [0,1,-99] and fan_forced not in [0,1,2,-99] or (enable == -99 and fan_forced == -99) %}
        M118 Help
        M118 └ ENABLE      = [0|1] Enable/disable multi-fan control
        M118 └ FAN_FORCED  = [0]   Force ALL OFF, [1] Force ALL ON, [2] AUTO per-sensor hysteresis
        M118
        M118 Status           : {"Enabled" if cfg.fan_control_enabled == 1 else "Disabled"}
        M118 Fan polling freq : {cfg.fan_polling_time}secs
        M118 Fan on temp      : {cfg.fan_on_temp}°C
        M118 Fan off temp     : {cfg.fan_off_temp}°C
        M118 Fan forced       : {"ALL OFF" if cfg.fan_forced == 0 else "ALL ON" if cfg.fan_forced == 1 else "AUTO"}

     {% else %}

         # Enable / disable
        {% if enable == 1 %}
           SET_GCODE_VARIABLE MACRO=_MMU_FAN_VARS VARIABLE=fan_control_enabled VALUE=True
           UPDATE_DELAYED_GCODE ID=_MMU_FAN_LOOP DURATION=0.1
           M118 MMU multi-fan monitor ENABLED

        {% elif enable == 0 %}

           SET_GCODE_VARIABLE MACRO=_MMU_FAN_VARS VARIABLE=fan_control_enabled VALUE=False
           UPDATE_DELAYED_GCODE ID=_MMU_FAN_LOOP DURATION=0
           {% set cfg = printer["gcode_macro _MMU_FAN_VARS"] %}
           {% set fans = (cfg.fans|string).replace(' ','').split(',') %}
           {% for f in fans %}
              {% if f|length > 0 %}
                 SET_FAN_SPEED FAN={f} SPEED=0.0
              {% endif %}
           {% endfor %}
           M118 MMU multi-fan monitor DISABLED and all fans OFF
        {% endif %}

        # Fan_Force options 
        {% if fan_forced in [0,1,2] %}
           SET_GCODE_VARIABLE MACRO=_MMU_FAN_VARS VARIABLE=fan_forced VALUE={fan_forced}
           {% set fans = (cfg.fans|string).replace(' ','').split(',') %}

           {% if fan_forced == 1 %}
              {% for f in fans %}
                 {% if f|length > 0 %}
                    SET_FAN_SPEED FAN={f} SPEED=1.0
                 {% endif %}
              {% endfor %}
              M118 MMU fans FORCED ON
           {% elif fan_forced == 0 %}
              {% for f in fans %}
                 {% if f|length > 0 %}
                    SET_FAN_SPEED FAN={f} SPEED=0.0
                 {% endif %}
              {% endfor %}
              M118 MMU fans FORCED OFF
           {% else %}
              M118 MMU fans returned to AUTO mode
           {% endif %}
        {% endif %}
     {% endif %}
  {% endif %}
  
[delayed_gcode _MMU_FAN_LOOP]
initial_duration: 1
gcode:

  {% if printer["gcode_macro _MMU_FAN_VARS"] is defined %}
     {% set cfg = printer["gcode_macro _MMU_FAN_VARS"] %}
     {% if cfg.fan_control_enabled %}
        {% set fan_forced  = cfg.fan_forced|int %}
        {% set on_t        = cfg.fan_on_temp|float %}
        {% set off_t       = cfg.fan_off_temp|float %}
        {% set sensors     = (cfg.fan_sensors|string).replace(' ','').split(',') %}
        {% set fans        = (cfg.fans|string).replace(' ','').split(',') %}
        {% set n_s         = sensors|length %}
        {% set n_f         = fans|length %}
        {% set n_min       = (n_s if n_s < n_f else n_f)|int %}

        {% if fan_forced == 1 %}
           {% for i in range(0, n_min) %}
              {% set f = fans[i] %}
              {% if f|length > 0 %}
                 SET_FAN_SPEED FAN={f} SPEED=1.0
              {% endif %}
           {% endfor %}
        {% elif fan_forced == 0 %}
           {% for i in range(0, n_min) %}
              {% set f = fans[i] %}
              {% if f|length > 0 %}
                 SET_FAN_SPEED FAN={f} SPEED=0.0
              {% endif %}
           {% endfor %}
        {% else %}
           {% for i in range(0, n_min) %}
              {% set s_name = sensors[i] %}
              {% set f = fans[i] %}
              {% if s_name|length > 0 and f|length > 0 %}
                 {% set t = printer["temperature_sensor " ~ s_name].temperature|float %}
                 {% set cur_speed = (printer["fan_generic " ~ f].speed|default(0.0))|float %}
                 {% set cur_state = 1 if cur_speed >= 0.5 else 0 %}
                 {% if cur_state == 0 %}
                    {% set target_state = 1 if t >= on_t else 0 %}
                 {% else %}
                    {% set target_state = 1 if t > off_t else 0 %}
                 {% endif %}
                 {% if target_state != cur_state %}
                    {% if target_state == 1 %}
                    SET_FAN_SPEED FAN={f} SPEED=1.0
                 {% else %}
                    SET_FAN_SPEED FAN={f} SPEED=0.0
                 {% endif %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endif %}

        UPDATE_DELAYED_GCODE ID=_MMU_FAN_LOOP DURATION={cfg.fan_polling_time}
     {% endif %}
  {% endif %}
