# └─────────────────────────────────────────────────────────────┘
#
# MMU FILAMAENT SENSORS: Define the pins for optional sensors in the filament path. A single [mmu_sensors] section is
# defined to cover ALL the gates of the mmu_unit and gate numbers always start with 0. All but the mmu entry sensors will
# be automatically# setup as both endstops (for homing) and sensors for visibility purposes
#
#   'mmu_entry_switch_pin_X'     .. 'mmu_entry_X' sensor detects filament at entry to MMU. X=gate number (0..N)
#   'mmu_exit_switch_pin_X'      .. 'mmu_exit_X' sensor on exit of each gate. Common on type-B but not type-A
#   'mmu_shared_exit_switch_pin' .. 'mmu_shared_exit' shared exit sensor detects filament past all gates (aka hub sensor)
#
# Pin configuration is flexible: Simply define pins for any sensor you want to enable, if pin is empty it will be
# ignored so no need to comment out what you are not using.
#
[mmu_sensors unit0]
# This is a sensor shared by all gates. On type-B designs it is often on the exit of the filament combiner (hub)
#
mmu_shared_exit_switch_pin: unit0:gpio14



# ┌───────────────────────────────────────────────────┐
# │ ██████╗ ██╗   ██╗███████╗███████╗███████╗██████╗  │
# │ ██╔══██╗██║   ██║██╔════╝██╔════╝██╔════╝██╔══██╗ │
# │ ██████╔╝██║   ██║█████╗  █████╗  █████╗  ██████╔╝ │
# │ ██╔══██╗██║   ██║██╔══╝  ██╔══╝  ██╔══╝  ██╔══██╗ │
# │ ██████╔╝╚██████╔╝██║     ██║     ███████╗██║  ██║ │
# │ ╚═════╝  ╚═════╝ ╚═╝     ╚═╝     ╚══════╝╚═╝  ╚═╝ │
# └───────────────────────────────────────────────────┘
#
# SYNC FEEDBACK SENSOR/BUFFER: Sync feedback sensors often called "buffers" are used to synchronize MMU gear stepper
# movement with the extruder. They will typically have a tension switch (most important) or both tension and compression.
# Note that compression switch is useful for use as a endstop to detect hitting the extruder entrance
#
#   'tension_pin'     .. pin for switch activated when filament is under tension
#   'compression_pin' .. pin for switch activated when filament is under compression
#
# Pin configuration is flexible: Simply define pins for any sensor you want to enable, if pin is empty it will be
# ignored so no need to comment out what you are not using
#
# Possible buffer setups, The forth option is for types where neutral is when both sensors are active:
#
#   <------maxrange------>       <------maxrange------>       <------maxrange------>       <------maxrange------>
#        <--range--->                  <----range----->       <----range----->                       <> range=0
#   |====================|       |====================|       |====================|       |====================|
#        ^          ^                  ^                                     ^                       ^^
#   compression   tension        compression-only                      tension-only
#
[mmu_buffer unit0]
buffer_range: 14.5		# Travel in "buffer" between compression/tension or one sensor and end (see above)
buffer_maxrange: 14.5	# Absolute maximum end-to-end travel (mm) provided by buffer (see above)

;tension_pin:     ^unit0:gpio12
;compression_pin: ^unit0:gpio28
tension_pin:     
compression_pin: 

# Proportional sync feedback sensor configuration. Leave empty if not fitted.
# (if you have a proportional sensor the sync_feedback_tension_pin and sync_feedback_compression_pin would likely be empty)
#
analog_pin: unit0:gpio29            # The ADC pin where the proportional filament pressure sensor is installed
analog_max_compression: 0.9910      # Raw sensor reading at max filament compression (buffer squeezed)
analog_max_tension: 0.0043      # Raw sensor reading at max filament tension (buffer expanded)
analog_neutral_point: 0.52  # Biasing of neutral point (sensor value 0). Normally close to 0.5
analog_gamma: 1.0			# Hidden option to change the "shape" the response around neutral_point
analog_sensor_threshold: 0.5    # The point at which the virtual compression/tension sensors are triggered (on 0-1 scale)



